version: '3.9'
services:
  backend:
    build:
      context: ./backend .
    dns:
      - 8.8.8.8
      - 8.8.4.4
    ports:
      - "9000:9000"
    env_file: .env
    volumes:
      - ./data:/app/data   # WHY volume: FAISS index persists between restarts
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev -- --host"
    environment:
      - VITE_API_URL=http://localhost:9000
    depends_on:
      - backend