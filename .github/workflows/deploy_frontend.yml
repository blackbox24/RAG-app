name: Deploy Frontend

on:
    workflow_run:
      workflows: ["Test and deploy Backend"]
      types: [completed]
      

jobs:
    deploy:
        runs-on: ubuntu-latest
        if: github.ref == 'refs/heads/main'

        steps:
            - name: Checkout repo
              uses: actions/checkout@v4

            - name: Setup node env
              uses: actions/setup-node@v4
              with:
                node-version: "20"
                cache: "npm"
                cache-dependency-path: frontend/package-lock.json

            - name: Install and build frontend
              working-directory: frontend
              run: |
                npm ci                    # WHY ci not install: faster, uses lockfile exactly
                npm run build
              env:
                VITE_API_URL: ${{ secrets.VITE_API_URL }}

            - name: Deploy frontend to DO Spaces
                # WHY Spaces for frontend: free static hosting via CDN, no extra service
              uses: jakejarvis/s3-sync-action@v0.5.1
              with:
                args: --acl public-read --follow-symlinks --delete
              env:
                AWS_S3_BUCKET: ${{ secrets.SPACES_BUCKET }}
                AWS_ACCESS_KEY_ID: ${{ secrets.SPACES_KEY }}
                AWS_SECRET_ACCESS_KEY: ${{ secrets.SPACES_SECRET }}
                AWS_S3_ENDPOINT: ${{ secrets.SPACES_ENDPOINT }}
                SOURCE_DIR: frontend/dist